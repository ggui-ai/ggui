name: Publish Gate

# Pre-publish verification for github.com/ggui-ai/ggui. Runs the full
# gate before an npm release, in two complementary halves:
#
#   - SOURCE verification — install / build / typecheck / unit / e2e
#     against workspace source.
#   - PACKAGING verification — the clean-room-consumer registry
#     round-trip: build tarballs, publish to a throwaway Verdaccio,
#     install into a fresh consumer with zero workspace linkage, run
#     import / cli / serve smokes. This is the ONLY check that
#     exercises the published artifacts; source build/test cannot
#     catch packaging bugs.
#
# Manual `workflow_dispatch` for now. Once proven by dispatch runs,
# this becomes a required prerequisite of release.yml (add a
# `workflow_call` trigger + a `uses:` from release.yml's preflight).
#
# Lives under `oss/.github/workflows/` in the monorepo; the subtree
# split strips the `oss/` prefix, so it runs as
# `.github/workflows/publish-gate.yml` in the public repo — where the
# repo root holds `packages/`, `e2e/`, `samples/`, `misc/`.

on:
  workflow_dispatch:

concurrency:
  group: publish-gate
  cancel-in-progress: true

jobs:
  source:
    name: Source — install / build / typecheck / unit / e2e
    runs-on: ubuntu-latest
    # The `with-llm` environment holds ANTHROPIC_API_KEY (for the
    # real-LLM e2e). It's branch-restricted to `main` and only jobs
    # that opt in here can read it — so the key is never exposed to
    # other workflows or to PR/fork runs.
    environment: with-llm
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Install Playwright Chromium up front: `ui-visual-tester`'s
      # behavioral-validation unit tests (in the Unit step below) AND
      # the journeys e2e suite both launch a headless browser. One
      # install (shared ~/.cache/ms-playwright) covers every package.
      - name: Install Playwright Chromium
        run: pnpm -r --filter "./e2e/journeys" exec playwright install --with-deps chromium

      # `@ggui-ai/ui-gen` emits an 8 MB+ adapters bundle; tsup's worker
      # OOMs on the default runner heap. Bump for the build phase.
      - name: Build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: pnpm -r --filter "./packages/*" build

      - name: Typecheck
        run: pnpm -r --filter "./packages/*" typecheck

      - name: Unit tests
        run: pnpm -r --filter "./packages/*" test

      # Wire-contract scenarios + the Tier-2 MCP Apps host simulator
      # (both vitest). `ANTHROPIC_API_KEY` is a repo secret — set it in
      # ggui-ai/ggui → Settings → Secrets and variables → Actions. With
      # it, the real-LLM scenarios (06/07) run; without it they
      # self-skip and the gate still passes.
      - name: E2E — wire scenarios + MCP host simulator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm -r --filter "./e2e/scenarios" --filter "./e2e/mcp-host-simulator" test

      # The journeys Playwright suite — real `ggui serve` spawns + local
      # `pnpm pack` tarball-install round-trips. Its harness resolves
      # workspace paths context-independently (tests/workspace-paths.ts
      # walks up to `pnpm-workspace.yaml`), so it runs unchanged in this
      # subtree-split repo. `ANTHROPIC_API_KEY` un-skips the live-BYOK
      # specs; without it they self-skip.
      - name: E2E — journeys (real CLI + tarball install)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm -r --filter "./e2e/journeys" test

  clean-room-consumer:
    name: Packaging — clean-room-consumer registry round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build tarballs → publish to Verdaccio → install clean-room → smoke
        run: |
          cd e2e/clean-room-consumer
          docker compose build
          docker compose up --abort-on-container-exit --exit-code-from gate-runner

      - name: Tear down
        if: always()
        run: cd e2e/clean-room-consumer && docker compose down -v --remove-orphans
