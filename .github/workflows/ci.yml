name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # `@ggui-ai/ui-visual-tester` is a publishable package whose unit
      # tests launch a headless Chromium for behavioral contract
      # validation. Install the browser before the Test step or those 6
      # tests fail with "browserType.launch: Executable doesn't exist".
      # The binary lands in the shared ~/.cache/ms-playwright.
      - name: Install Playwright Chromium
        run: pnpm -r --filter "./e2e/journeys" exec playwright install --with-deps chromium

      # Scope CI build/typecheck/test to the publishable packages/ tree.
      # The e2e suites, samples, and misc/ tooling are workspace members
      # (so their `@ggui-ai/*` imports resolve) but are exercised by
      # their own suites / the publish gate.
      #
      # `@ggui-ai/ui-gen` emits an 8 MB+ adapters bundle; tsup's worker
      # OOMs on the 7 GB default GitHub runner with Node's default
      # heap. Bump for the build phase only.
      - name: Build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: pnpm -r --filter "./packages/*" build

      - name: Typecheck
        run: pnpm -r --filter "./packages/*" typecheck

      - name: Test
        run: pnpm -r --filter "./packages/*" test
