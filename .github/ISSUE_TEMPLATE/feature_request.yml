name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@ggui-ai/protocol"
        - "@ggui-ai/mcp-server"
        - "@ggui-ai/server"
        - "@ggui-ai/react"
        - "@ggui-ai/react-native"
        - "@ggui-ai/cli"
        - "@ggui-ai/wire"
        - New package
        - Platform / general
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      placeholder: How would you use this?
