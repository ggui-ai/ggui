name: Bug Report
description: Report a bug in a ggui package
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@ggui-ai/cli"
        - "@ggui-ai/protocol"
        - "@ggui-ai/mcp-server"
        - "@ggui-ai/mcp-server-core"
        - "@ggui-ai/mcp-server-handlers"
        - "@ggui-ai/react"
        - "@ggui-ai/react-native"
        - "@ggui-ai/wire"
        - "@ggui-ai/shared"
        - "@ggui-ai/design"
        - "@ggui-ai/console"
        - "@ggui-ai/iframe-runtime"
        - "@ggui-ai/registry-server"
        - "@ggui-ai/registry-core"
        - "@ggui-ai/ui-gen"
        - "@ggui-ai/protocol-conformance"
        - "@ggui-ai/protocol-reference-server"
        - Other / multiple
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      placeholder: Steps to reproduce or minimal code example
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0-rc.1"
