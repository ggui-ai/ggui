name: ggui-scaffold-render

# One shared Verdaccio + a cell that scaffolds, boots, and drives the published
# app. The cell publishes the cohort to the sibling Verdaccio (no DinD), then
# runs setup → scaffold → pnpm dev → Playwright, all on the cell's own localhost.
#
# Run:  ANTHROPIC_API_KEY=… docker compose up --build --abort-on-container-exit --exit-code-from cell
# (or `make test-scaffold-render`). Tear down with `docker compose down -v`.
services:
  verdaccio:
    image: verdaccio/verdaccio:5
    # Reuse sub-tier A's config: @ggui-ai/* served local-only, max_body_size 50mb.
    volumes:
      - ../scaffold-resolution/verdaccio.yaml:/verdaccio/conf/config.yaml:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "require('http').get('http://localhost:4873/-/ping',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"
      interval: 2s
      timeout: 3s
      retries: 40
      start_period: 5s

  cell:
    # Build context is THIS dir (tiny) — the Dockerfile COPYs nothing; the
    # monorepo arrives via the /repo bind-mount at run time, so there is no need
    # to upload the whole worktree (node_modules/.git) as build context.
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      verdaccio:
        condition: service_healthy
    environment:
      REGISTRY: http://verdaccio:4873
      SKIP_VERDACCIO_BOOT: "1"
      SDK: ${SDK:-claude-agent-sdk}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY — sub-tier B drives a real LLM}
      # Optional: forward for the non-claude agent SDKs (claude needs only ANTHROPIC).
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      CI: ${CI:-}
    # Read-write so the cell can `pnpm install` + `pnpm build` the cohort.
    # CI checks out fresh (clean); local runs reuse the worktree's
    # node_modules/dist (gitignored, regenerable).
    volumes:
      - ../../..:/repo
