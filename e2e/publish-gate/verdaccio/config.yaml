# Throwaway local npm registry for the publish gate.
#
# `@ggui-ai/*` are served locally (published fresh each run); every
# other dependency is proxied from npmjs through the `npmjs` uplink so
# the clean-room consumer's `npm install` resolves its full tree
# without touching the public registry directly.
#
# Storage is wiped between runs — `make test-publish-gate` runs
# `docker compose down -v`, which drops the anonymous volume.
storage: /verdaccio/storage

# Verdaccio's default is 10mb — too small for heavier packages like
# @ggui-ai/ui-gen. Real npmjs accepts these fine; raise the cap so the
# gate's publish step mirrors npm rather than flagging a non-issue.
max_body_size: 200mb

uplinks:
  npmjs:
    url: https://registry.npmjs.org/
    cache: true

packages:
  "@ggui-ai/*":
    # Local-only: never proxy @ggui-ai/* to npmjs. The whole point of
    # the gate is to exercise the freshly-published local copies.
    access: $all
    publish: $all
    unpublish: $all
  "**":
    access: $all
    publish: $all
    proxy: npmjs

server:
  keepAliveTimeout: 60

listen: 0.0.0.0:4873

log:
  type: stdout
  format: pretty
  level: warn
